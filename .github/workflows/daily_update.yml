name: Daily NASDAQ DCA Strategy Update

on:
  # 每天定时执行 (使用 cron，UTC时间)
  schedule:
    - cron: '30 21 * * 1-5'  # 美股收盘后 (北京时间早上 5:30)，周二到周六早晨
    - cron: '0 3 * * 1-5'    # 预期北京时间 11:00（补偿 GitHub 调度延迟约 2-3h，实际约 13:00-14:00 触发）
  
  # 允许手动在 GitHub Actions 页面或通过 Webhook 触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests yfinance pandas numpy
        
    - name: Run Python Script (Fetch, Calc & Notify)
      env:
        BARK_KEY: ${{ secrets.BARK_KEY }}
      run: |
        python backend/fetch_and_calc.py
        
    - name: Run Backtest Data Generator (Only at ~13:00 BJ / 03:00 UTC or Manual)
      if: github.event.schedule == '0 3 * * 1-5' || github.event_name == 'workflow_dispatch'
      run: |
        python backend/backtest.py
        
    - name: Check for changes
      id: git-check
      run: |
        git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT
        
    - name: Commit and Push Data
      if: steps.git-check.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/data.json data/backtest_data.json
        git commit -m "Auto-update NASDAQ strategy and backtest data [skip ci]"
        git pull --rebase origin main
        git push
