name: Daily NASDAQ DCA Strategy Update

on:
  # 每天定时执行 (使用 cron，UTC时间)
  schedule:
    - cron: '30 21 * * 1-5'  # 美股收盘后 (北京时间早上 5:30)，周二到周六早晨
    - cron: '0 6 * * 1-5'    # 北京时间 14:00 (UTC 6:00)，周一到周五
  
  # 允许手动在 GitHub Actions 页面或通过 Webhook 触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests yfinance pandas
        
    - name: Run Python Script (Fetch, Calc & Notify)
      env:
        BARK_KEY: ${{ secrets.BARK_KEY }}
      run: |
        python backend/fetch_and_calc.py
        
    - name: Check for changes
      id: git-check
      run: |
        git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT
        
    - name: Commit and Push Data
      if: steps.git-check.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data.json
        git commit -m "Auto-update NASDAQ strategy data [skip ci]"
        git push
