name: Daily NASDAQ DCA Strategy Update

on:
  # 每天定时执行 (使用 cron，此处设为 UTC 21:30，大约北京时间早上 5:30，涵盖夏令时和冬令时美股收盘后)
  schedule:
    - cron: '30 21 * * 1-5'  # 周一到周五执行
  
  # 允许手动在 GitHub Actions 页面触发执行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Run Python Script (Fetch and Calc)
      run: |
        python backend/fetch_and_calc.py
        
    - name: Check for changes
      id: git-check
      run: |
        git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT
        
    - name: Commit and Push Data
      if: steps.git-check.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data.json
        git commit -m "Auto-update NASDAQ strategy data [skip ci]"
        git push
