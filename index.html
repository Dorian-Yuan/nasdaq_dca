<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>纳斯达克定投策略</title>
    <!-- PWA Settings -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./icon.png">
    <!-- Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>纳斯达克 (QQQ) 定投评估</h1>
            <p id="update-time" class="subtitle">加载中...</p>
        </header>

        <!-- 主状态红绿灯区 -->
        <section class="status-card" id="main-status-card">
            <div class="status-indicator">
                <div class="light" id="light-red"></div>
                <div class="light" id="light-yellow"></div>
                <div class="light" id="light-green"></div>
            </div>
            <h2 id="decision-text">评估中</h2>
            <div style="margin-bottom: 12px; font-weight: 600; color: var(--text-secondary); font-size: 14px;">综合权重得分:
                <span id="val-final-weight">--</span> 倍
            </div>
        </section>

        <!-- 详细指标区 -->
        <section class="metrics-grid">
            <!-- 乖离率卡片 -->
            <div class="metric-card">
                <div class="metric-title">
                    <span>200日均线乖离率 <span class="tooltip-icon" tabindex="0" onclick=""
                            data-tooltip="衡量当前价格偏离过去200天平均成本的百分比。&#xa;偏离过大可能发生均值回归（下跌），跌破太多则可能是超跌反弹（抄底）的信号。">?</span></span>
                    <span id="decision-bias" class="metric-decision">--</span>
                </div>
                <div class="metric-value" id="val-bias">--%</div>
                <div class="metric-sub">QQQ 价格: <span id="val-price">--</span></div>
            </div>

            <!-- 估值卡片 -->
            <div class="metric-card">
                <div class="metric-title">
                    <span>纳指100 PE 百分位 <span class="tooltip-icon" tabindex="0" onclick=""
                            data-tooltip="衡量当前市盈率(PE)在过去很长一段时间历史中处于什么位置。&#xa;数值越低代表越便宜（被低估），数值越高代表越贵（被高估甚至有泡沫）。">?</span></span>
                    <span id="decision-pe" class="metric-decision">--</span>
                </div>
                <div class="metric-value" id="val-pe-pct">--%</div>
                <div class="metric-sub">相对估值: <span id="val-pe">--</span></div>
            </div>

            <!-- 情绪卡片 -->
            <div class="metric-card">
                <div class="metric-title">
                    <span>期权波动率 (^VXN) <span class="tooltip-icon" tabindex="0" onclick=""
                            data-tooltip="CBOE 纳斯达克 100 波动率指数。&#xa;通常15-20为常态，低于15偏向贪婪，高于30代表恐慌并开始提供可观的买入乘数。">?</span></span>
                    <span id="decision-vxn" class="metric-decision">--</span>
                </div>
                <div class="metric-value" id="val-vxn">--</div>
                <div class="metric-sub" style="visibility: hidden;">--</div>
            </div>
        </section>

        <!-- 刷新按钮区 -->
        <section class="action-section">
            <button id="refresh-btn" class="btn primary-btn">强制刷新策略数据</button>
        </section>

        <footer>
            <p>数据从雅虎财经、蛋卷基金及市场情绪接口获取。</p>
        </footer>
    </div>

    <!-- Config for Github Actions. (This file is ignored by git) -->
    <script src="./config.js"></script>
    <script src="./app.js"></script>
</body>

</html>
